name: Frontend CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]    
    workflow_dispatch:
jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./frontend 
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package.json
            - name: Install dependencies
              run: npm install

            - name: Run ESLint
              run: npm run lint
            - name: Check for type errors with TypeScript
              run: npm run type-check
            - name: Type check with TypeScript
              run: npx tsc --noEmit
    build:
        runs-on: ubuntu-latest
        needs: lint
        defaults:
            run:
                working-directory: ./frontend 
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package.json
            - name: Install dependencies
              run: npm install

            - name: Build the application
              run: npm run build
